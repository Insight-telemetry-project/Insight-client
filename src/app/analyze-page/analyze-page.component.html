<div class="archivePage">
  <header class="archiveHeader">
    <div class="headerLeft">
      <h1 class="title">Flight {{ masterIndex }}</h1>
      <p class="subtitle">Click a parameter to add/remove it to the main chart</p>
    </div>
  </header>

  <button class="back-btn" type="button" (click)="goBack()" aria-label="Back">←</button>

  <section class="mainChartSection">
    <div class="mainChartCard">
      <div #mainChart class="mainChart"></div>
    </div>
  </section>

  <div class="relatedInline" *ngIf="related.relatedForParam">
    <button class="relatedInlineBtn" type="button" (click)="toggleRelatedList()">
      Related: {{ related.relatedForParam }} ({{ related.relatedLoading ? '...' : related.relatedParams.length }})
    </button>

    <div class="relatedInlineList" *ngIf="related.relatedOpen">
      <div class="relatedInlineError" *ngIf="related.relatedError">{{ related.relatedError }}</div>

      <button
        class="relatedInlineItem"
        *ngFor="let p of related.relatedParams"
        [class.selected]="isSelected(p)"
        type="button"
        (click)="onRelatedParamClick(p)"
      >
        {{ p }}
      </button>
    </div>
  </div>

  <section class="paramsSection">
    <div class="paramsHeader">
      <span class="paramsTitle">Parameters</span>
      <span class="paramsCount">{{ parameters.length }} charts</span>
    </div>

    <div class="paramsGrid">
      <button
        class="paramCard"
        *ngFor="let param of parameters"
        [class.selected]="isSelected(param)"
        (click)="toggleParam(param)"
      >
        <div class="paramTitle">{{ param }}</div>
        <div class="miniChart" #miniChart [attr.data-param]="param"></div>
      </button>
    </div>
  </section>
</div>
